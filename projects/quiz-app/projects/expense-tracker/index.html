<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">

    <header>
      <a href="../../index.html" class="back">← Back to Showcase</a>
      <h1>💸 Expense Tracker</h1>
    </header>

    <!-- Balance -->
    <div class="balance-card">
      <p>Total Balance</p>
      <h2 id="balance">₹0.00</h2>
    </div>

    <!-- Income / Expense Summary -->
    <div class="summary">
      <div class="summary-box income">
        <p>Income</p>
        <h3 id="total-income">₹0.00</h3>
      </div>
      <div class="summary-box expense">
        <p>Expense</p>
        <h3 id="total-expense">₹0.00</h3>
      </div>
    </div>

    <!-- Add Transaction Form -->
    <div class="form-card">
      <h3>Add Transaction</h3>

      <div class="form-group">
        <label>Description</label>
        <input type="text" id="desc" placeholder="e.g. Salary, Groceries..." />
      </div>

      <div class="form-group">
        <label>Amount</label>
        <input type="number" id="amount" placeholder="Enter amount" />
      </div>

      <div class="form-group">
        <label>Type</label>
        <div class="toggle">
          <button class="toggle-btn active" id="btn-income" onclick="setType('income')">Income</button>
          <button class="toggle-btn" id="btn-expense" onclick="setType('expense')">Expense</button>
        </div>
      </div>

      <button class="add-btn" onclick="addTransaction()">Add Transaction</button>
      <p class="error" id="error"></p>
    </div>

    <!-- Transaction List -->
    <div class="list-card">
      <div class="list-header">
        <h3>Transactions</h3>
        <button class="clear-btn" onclick="clearAll()">Clear All</button>
      </div>
      <ul id="transaction-list"></ul>
      <p class="empty" id="empty-msg">No transactions yet.</p>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
